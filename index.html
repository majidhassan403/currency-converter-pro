<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter | Majid Hassan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Currency Converter</h2>
    <form>
      <div class="amount">
        <p>Enter Amount</p>
        <input type="number" value="1" id="amount">
      </div>

      <div class="dropdown">
        <div class="from">
          <p>From</p>
          <div class="select-container">
            <img id="fromFlag" src="https://flagcdn.com/48x36/us.png">
            <select id="from"></select>
          </div>
        </div>

        <div class="to">
          <p>To</p>
          <div class="select-container">
            <img id="toFlag" src="https://flagcdn.com/48x36/pk.png">
            <select id="to"></select>
          </div>
        </div>
      </div>

      <div class="msg">Getting exchange rate...</div>
      <button type="button" id="btn">Get Exchange Rate</button>
    </form>
  </div>

  <script src="list.js"></script>
  <script src="app.js"></script>
</body>
</html>
